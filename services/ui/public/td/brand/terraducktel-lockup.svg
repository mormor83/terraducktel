<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" role="img" aria-label="TerraDuckTel — Automated Infrastructure &amp; Terraform">
  <title>TerraDuckTel</title>
  <defs>
    <linearGradient id="lk-wing" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#0e3636"/>
      <stop offset="35%" stop-color="#1f6f6c"/>
      <stop offset="75%" stop-color="#3f9b3e"/>
      <stop offset="100%" stop-color="#7ed078"/>
    </linearGradient>
    <linearGradient id="lk-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6f6c"/>
      <stop offset="100%" stop-color="#5eb85a"/>
    </linearGradient>
  </defs>

  <!-- Same duck mark as the standalone (mark.svg), scaled to 0.48 so it fits
       beside the wordmark. Same animation behaviour: opposing wing flap,
       head bob. Particles are dropped from this variant — they'd be invisibly
       tiny at 0.48× and just add render cost. -->
  <g transform="translate(0,0) scale(0.48)">
    <g transform-origin="92 102">
      <animateTransform attributeName="transform" type="rotate"
        values="-8 92 102; 14 92 102; -8 92 102"
        dur="1.4s" repeatCount="indefinite" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" calcMode="spline"/>
      <path d="M 92 102 C 78 78, 62 56, 38 48 C 48 62, 50 78, 52 94 C 40 88, 28 88, 18 96 C 32 98, 44 104, 54 114 C 50 112, 44 116, 40 122 C 56 118, 72 114, 92 108 Z" fill="url(#lk-wing)" opacity="0.92"/>
    </g>
    <g transform-origin="108 102">
      <animateTransform attributeName="transform" type="rotate"
        values="-14 108 102; 8 108 102; -14 108 102"
        dur="1.4s" begin="-0.7s" repeatCount="indefinite" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" calcMode="spline"/>
      <path d="M 108 102 C 124 76, 144 56, 172 48 C 162 64, 158 80, 156 96 C 168 92, 180 94, 188 102 C 174 104, 162 110, 152 120 C 156 118, 162 122, 168 128 C 148 122, 130 116, 108 110 Z" fill="url(#lk-wing)"/>
      <path d="M 110 100 C 128 84, 148 72, 166 64 L 162 78 C 144 88, 128 96, 112 104 Z" fill="#7ed078" opacity="0.45"/>
    </g>
    <path d="M 70 122 C 80 110, 96 104, 112 104 C 130 102, 144 96, 154 86 C 152 92, 148 96, 144 100 L 146 102 C 144 108, 138 112, 130 114 C 118 118, 104 122, 92 126 C 82 128, 74 128, 70 122 Z" fill="url(#lk-body)"/>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 -2.2; 0 0; 0 1.2; 0 0"
        dur="1.6s" repeatCount="indefinite" keyTimes="0;0.25;0.5;0.75;1"/>
      <path d="M 144 88 C 152 84, 160 84, 164 88 C 166 92, 164 96, 160 98 L 156 100 C 152 100, 148 98, 146 94 Z" fill="url(#lk-body)"/>
      <path d="M 164 92 L 176 94 L 174 99 L 162 97 Z" fill="#7ed078"/>
      <circle cx="157" cy="91" r="1.6" fill="#0e1f1d"/>
    </g>
  </g>

  <text x="110" y="50" font-family="'Space Grotesk', Inter, system-ui, sans-serif" font-size="30" font-weight="700" fill="#1f6f6c" letter-spacing="1.5">TERRADUCKTEL</text>
  <text x="110" y="68" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3a4641" letter-spacing="3.2">AUTOMATED  INFRASTRUCTURE  &amp;  TERRAFORM</text>
</svg>
