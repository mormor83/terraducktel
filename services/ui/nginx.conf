server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers (apply to every response) ────────────────────────
    # CSP: allow only self + the Google Fonts stylesheet used in index.html and
    # the inline app shell vite emits. `connect-src` includes self so the SPA
    # can talk to /api on the same origin. Tighten further when we drop the
    # remaining inline styles from the design tokens.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # HSTS: only meaningful behind TLS, but harmless on plain-http loopback.
    # 6 months + preload-eligible. Bump to 1y once you've verified prod TLS.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Misc hardening — no MIME sniffing, no framing, conservative referrer.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Use Docker's embedded DNS so nginx re-resolves `api` on every request.
    # Without this, nginx caches the upstream IP at startup and keeps proxying
    # to a dead IP after the API container is restarted (causing 502s until the
    # UI itself is restarted).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API (browser uses same origin: /api -> FastAPI)
    location /api {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Cache static assets — note `add_header` inside a location replaces the
    # server-level set, so we re-emit the security headers we still want here.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
