name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: terraducktel_test
          POSTGRES_USER: terraducktel
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U terraducktel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://terraducktel:testpass@localhost:5432/terraducktel_test
      JWT_SECRET_KEY: ci-test-secret-key-32-bytes-long!!
      CREDENTIAL_ENCRYPTION_KEY: ci-test-encryption-key-32-bytes!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: services/api
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: services/api
        run: python -m pytest tests/ -v --tb=short

  ui-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: services/ui
        run: npm ci
      - name: Type check and build
        working-directory: services/ui
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy (pinned + checksum-verified)
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.70.0
          TRIVY_TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"
          curl -sfLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_TARBALL}"
          curl -sfLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          grep " ${TRIVY_TARBALL}\$" "trivy_${TRIVY_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${TRIVY_TARBALL}" -C /usr/local/bin trivy
          chmod +x /usr/local/bin/trivy
          cd - >/dev/null
          rm -rf "$WORKDIR"
          trivy --version
      - name: Run Trivy config scan
        run: |
          trivy config . --severity HIGH,CRITICAL --exit-code 1 || true
